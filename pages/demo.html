<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCOUT AI - الديمو</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Kufi Arabic',sans-serif;background:#0a0f1a;color:#eef2f7;min-height:100vh}
.nav{position:fixed;top:0;width:100%;background:rgba(10,15,26,0.95);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e2a3a;z-index:100}
.logo{font-size:18px;font-weight:900}
.logo span{color:#00e676}
.back{color:#00e676;text-decoration:none;font-size:14px}
.main{padding-top:60px;padding:20px;max-width:600px;margin:0 auto}
.card{background:#0f1729;border:1px solid #1e2a3a;border-radius:16px;padding:24px;margin-bottom:20px}
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,#00e676,#00c853);color:#0a0f1a}
.btn-secondary{background:#0f1729;color:#eef2f7;border:1px solid #1e2a3a}
input,select{width:100%;padding:12px;border-radius:10px;border:1px solid #1e2a3a;background:#0a0f1a;color:#eef2f7;font-family:inherit;margin-bottom:12px}
.title{text-align:center;margin-bottom:20px;font-size:24px;font-weight:700}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.name{font-size:22px;font-weight:700}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;background:rgba(0,230,118,0.15);color:#00e676;font-size:12px;margin-left:8px}
.score{width:70px;height:70px;border-radius:50%;border:3px solid #00e676;display:flex;align-items:center;justify-content:center;background:rgba(0,230,118,0.15)}
.score-num{font-size:24px;font-weight:900;color:#00e676}
.skill{display:flex;justify-content:space-between;margin-bottom:6px}
.skill-name{color:#6b7a90;font-size:14px}
.skill-value{color:#00e676;font-weight:700}
.skill-bar{height:6px;background:#1e2a3a;border-radius:3px;overflow:hidden;margin-bottom:14px}
.skill-fill{height:100%;background:#00e676}
.dna{background:#0a0f1a;border:1px solid #ffd700;border-radius:12px;padding:16px;text-align:center;margin-top:16px}
.dna-title{color:#ffd700;font-weight:700;margin-bottom:12px}
.dna-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.dna-item{background:#0f1729;border:1px solid #1e2a3a;border-radius:8px;padding:10px}
.dna-item.recommended{border-color:#ffd700;background:rgba(255,215,0,0.1)}
.dna-match{font-size:18px;font-weight:800}
.dna-item.recommended .dna-match{color:#ffd700}
.dna-pos{font-size:10px;color:#6b7a90}
.scout{background:linear-gradient(135deg,rgba(0,230,118,0.15),transparent);border:1px solid #00e676;border-radius:12px;padding:16px;text-align:center;margin-top:16px}
.scout-title{color:#00e676;font-weight:700;margin-bottom:12px}
.scout-grid{display:flex;justify-content:center;gap:20px}
.scout-item{text-align:center}
.scout-label{font-size:11px;color:#6b7a90}
.scout-value{font-size:20px;font-weight:800;color:#00e676}
.scout-final{font-size:24px;font-weight:900;color:#ffd700}
.loader{font-size:48px;text-align:center;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.progress{height:6px;background:#1e2a3a;border-radius:3px;overflow:hidden;max-width:300px;margin:20px auto}
.progress-fill{height:100%;background:#00e676;width:0%;transition:width 0.3s}
.status{text-align:center;color:#00e676;margin-top:12px}
.chart{max-width:300px;margin:0 auto}
.hidden{display:none}
</style>
</head>
<body>
<nav class="nav">
<a href="../index.html" class="back">← الرئيسية</a>
<span class="logo">⚡ SCOUT <span>AI</span></span>
<span></span>
</nav>

<main class="main">
<!-- Register -->
<div id="register" class="card">
<h2 class="title">تسجيل لاعب جديد</h2>
<input type="text" id="playerName" placeholder="اسم اللاعب">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<input type="number" id="playerAge" placeholder="العمر">
<select id="playerCity"><option>الرياض</option><option>جدة</option><option>الدمام</option></select>
</div>
<select id="playerPos"><option>مهاجم</option><option>جناح</option><option>وسط هجومي</option><option>وسط دفاعي</option><option>مدافع</option></select>
<button class="btn btn-primary" onclick="startAnalysis()">🤖 ابدأ التحليل</button>
</div>

<!-- Analyzing -->
<div id="analyzing" class="card hidden">
<div class="loader">⚽</div>
<div class="status" id="status">جاري التحليل...</div>
<div class="progress"><div class="progress-fill" id="progress"></div></div>
</div>

<!-- Results -->
<div id="results" class="card hidden">
<div class="header">
<div><div class="name" id="resName">أحمد</div><div><span class="badge" id="resPos">مهاجم</span><span class="badge" style="background:#0a0f1a;color:#6b7a90" id="resAge">17 سنة</span></div></div>
<div class="score"><div class="score-num" id="resScore">84</div></div>
</div>

<div class="skill"><span class="skill-name">⚡ السرعة</span><span class="skill-value" id="s1">87</span></div>
<div class="skill-bar"><div class="skill-fill" id="b1" style="width:87%"></div></div>

<div class="skill"><span class="skill-name">🎯 التسديد</span><span class="skill-value" id="s2">81</span></div>
<div class="skill-bar"><div class="skill-fill" id="b2" style="width:81%"></div></div>

<div class="skill"><span class="skill-name">👟 التمرير</span><span class="skill-value" id="s3">82</span></div>
<div class="skill-bar"><div class="skill-fill" id="b3" style="width:82%"></div></div>

<div class="skill"><span class="skill-name">🏃 المراوغة</span><span class="skill-value" id="s4">84</span></div>
<div class="skill-bar"><div class="skill-fill" id="b4" style="width:84%"></div></div>

<div class="skill"><span class="skill-name">👁️ الرؤية</span><span class="skill-value" id="s5">79</span></div>
<div class="skill-bar"><div class="skill-fill" id="b5" style="width:79%"></div></div>

<div class="skill"><span class="skill-name">🎮 التحكم</span><span class="skill-value" id="s6">86</span></div>
<div class="skill-bar"><div class="skill-fill" id="b6" style="width:86%"></div></div>

<div class="chart"><canvas id="radarChart"></canvas></div>

<div class="dna">
<div class="dna-title">🧬 Sport DNA - أفضل مركز</div>
<div class="dna-grid">
<div class="dna-item"><div class="dna-match">78%</div><div class="dna-pos">مهاجم</div></div>
<div class="dna-item"><div class="dna-match">82%</div><div class="dna-pos">جناح</div></div>
<div class="dna-item recommended"><div class="dna-match">86%</div><div class="dna-pos">وسط هجومي ⭐</div></div>
</div>
</div>

<div class="scout">
<div class="scout-title">🏆 تقييم الكشاف</div>
<div class="scout-grid">
<div class="scout-item"><div class="scout-label">AI</div><div class="scout-value">84</div></div>
<div class="scout-item"><div class="scout-label">الكشاف</div><div class="scout-value">82</div></div>
<div class="scout-item"><div class="scout-label">النتيجة</div><div class="scout-final">83</div></div>
</div>
</div>

<button class="btn btn-secondary" onclick="reset()" style="margin-top:16px">← تسجيل لاعب آخر</button>
</div>
</main>

<script>
let chart = null;

function show(id) {
  document.getElementById('register').classList.add('hidden');
  document.getElementById('analyzing').classList.add('hidden');
  document.getElementById('results').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}

function startAnalysis() {
  const name = document.getElementById('playerName').value;
  const age = document.getElementById('playerAge').value;
  const pos = document.getElementById('playerPos').value;
  
  if (!name || !age) { alert('الرجاء إدخال الاسم والعمر'); return; }
  
  show('analyzing');
  
  const status = document.getElementById('status');
  const bar = document.getElementById('progress');
  const steps = ['جاري تحميل AI...','تحليل الحركة...','كشف المهارات...','حساب الأداء...','إنشاء التقرير...'];
  let i = 0, p = 0;
  
  const interval = setInterval(() => {
    p += 3;
    if (p > 100) p = 100;
    bar.style.width = p + '%';
    status.innerText = steps[Math.min(i, steps.length-1)];
    if (p % 20 === 0) i++;
    
    if (p >= 100) {
      clearInterval(interval);
      setTimeout(() => {
        const score = 70 + Math.floor(Math.random() * 25);
        document.getElementById('resName').innerText = name;
        document.getElementById('resPos').innerText = pos;
        document.getElementById('resAge').innerText = age + ' سنة';
        document.getElementById('resScore').innerText = score;
        
        const skills = [];
        for (let i = 1; i <= 6; i++) {
          const v = 70 + Math.floor(Math.random() * 25);
          skills.push(v);
          document.getElementById('s' + i).innerText = v;
          document.getElementById('b' + i).style.width = v + '%';
        }
        
        show('results');
        drawChart(skills);
      }, 500);
    }
  }, 80);
}

function drawChart(skills) {
  const ctx = document.getElementById('radarChart');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['السرعة', 'التسديد', 'التمرير', 'المراوغة', 'الرؤية', 'التحكم'],
      datasets: [{
        label: 'المهارات',
        data: skills,
        backgroundColor: 'rgba(0,230,118,0.2)',
        borderColor: '#00e676',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      scales: {
        r: {
          min: 0, max: 100,
          ticks: { display: false },
          grid: { color: 'rgba(255,255,255,0.1)' },
          angleLines: { color: 'rgba(255,255,255,0.1)' },
          pointLabels: { color: '#6b7a90', font: { size: 11 } }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function reset() {
  document.getElementById('playerName').value = '';
  document.getElementById('playerAge').value = '';
  document.getElementById('progress').style.width = '0%';
  show('register');
}
</script>
</body>
</html>
