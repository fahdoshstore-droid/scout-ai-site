<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCOUT AI — اكتشف المواهب</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1a; font-family: 'Noto Kufi Arabic', sans-serif; color: #f0f4f8; }
    .container { max-width: 700px; margin: 0 auto; padding: 20px; }
    .btn { background: linear-gradient(135deg, #00e676, #00c853); color: #0a0f1a; padding: 14px 36px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin: 10px; }
    .card { background: #111827; padding: 24px; border-radius: 16px; margin: 16px 0; border: 1px solid #1e2a3a; }
    .score { font-size: 48px; font-weight: bold; color: #00e676; }
    .tabs { display: flex; gap: 8px; margin: 16px 0; }
    .tab { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #111827; color: #8892a4; cursor: pointer; }
    .tab.active { background: #00e676; color: #0a0f1a; }
    .hidden { display: none; }
    .upload-zone { border: 2px dashed #1e2a3a; border-radius: 16px; padding: 40px; text-align: center; cursor: pointer; margin-bottom: 24px; }
    .upload-zone:hover { border-color: #00e676; background: rgba(0,230,118,0.1); }
    input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #1e2a3a; background: #0a0f1a; color: #f0f4f8; margin: 8px 0; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // Simple SPA
    const state = { page: 'home', player: null, analysis: null };
    
    function render() {
      const app = document.getElementById('app');
      
      if (state.page === 'home') {
        app.innerHTML = `
          <div class="container" style="text-align:center;padding:60px 20px;">
            <div style="width:90px;height:90px;background:linear-gradient(135deg,#00e676,#00c853);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:40px;">⚡</div>
            <h1 style="font-size:48px;margin-bottom:8px;">SCOUT <span style="color:#00e676">AI</span></h1>
            <p style="color:#8892a4;margin-bottom:40px;">اكتشف المواهب الرياضية بالذكاء الاصطناعي</p>
            <button class="btn" onclick="goUpload()">🎬 ارفع فيديو للتحليل</button>
            <button class="btn" style="background:transparent;border:2px solid #00e67644;color:#00e676" onclick="goScout()">🔍 دخول الكشاف</button>
          </div>
        `;
      }
      
      else if (state.page === 'upload') {
        app.innerHTML = `
          <div class="container">
            <button onclick="goHome()" style="background:none;border:none;color:#00e676;cursor:pointer;margin-bottom:20px;">← الرئيسية</button>
            <h2 style="margin-bottom:24px;">تحليل موهبة جديدة</h2>
            <div class="upload-zone" onclick="document.getElementById('file').click()">
              <div style="font-size:40px;margin-bottom:12px;">🎥</div>
              <div>اسحب الفيديو هنا أو اضغط للاختيار</div>
              <div style="color:#8892a4;font-size:11px;margin-top:8px;">MP4, MOV — حد أقصى 100MB</div>
              <input type="file" id="file" accept="video/*" style="display:none">
            </div>
            <div class="card">
              <input type="text" id="name" placeholder="اسم اللاعب">
              <input type="number" id="age" placeholder="العمر">
              <select id="position">
                <option>مهاجم</option>
                <option>وسط</option>
                <option>مدافع</option>
                <option>حارس مرمي</option>
              </select>
            </div>
            <button class="btn" style="width:100%" onclick="startAnalyze()">⚡ ابدأ التحليل</button>
          </div>
        `;
      }
      
      else if (state.page === 'analyzing') {
        app.innerHTML = `
          <div class="container" style="text-align:center;padding:60px;">
            <div style="width:120px;height:120px;border:3px solid #1e2a3a;border-top-color:#00e676;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 32px;"></div>
            <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
            <h2>جاري تحليل ${state.player?.name || 'اللاعب'}...</h2>
          </div>
        `;
        setTimeout(() => {
          state.analysis = generateAnalysis(state.player.name, state.player.age, state.player.position);
          state.page = 'report';
          render();
        }, 2500);
      }
      
      else if (state.page === 'report') {
        const a = state.analysis;
        const c = a.overall >= 80 ? '#00e676' : a.overall >= 65 ? '#ffc107' : '#ff5252';
        app.innerHTML = `
          <div class="container">
            <button onclick="goHome()" style="background:none;border:none;color:#00e676;cursor:pointer;margin-bottom:20px;">← الرئيسية</button>
            <div class="card">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div>
                  <h2>${state.player.name}</h2>
                  <span style="background:#00e67622;color:#00e676;padding:3px 10px;border-radius:20px;font-size:11px;margin-right:8px">${state.player.position}</span>
                  <span style="background:#42a5f522;color:#42a5f5;padding:3px 10px;border-radius:20px;font-size:11px">${state.player.city}</span>
                </div>
                <div style="text-align:center">
                  <div style="width:80px;height:80px;border-radius:50%;border:3px solid ${c};display:flex;align-items:center;justify-content:center;background:${c}11">
                    <span style="font-size:30px;font-weight:800;color:${c}">${a.overall}</span>
                  </div>
                </div>
              </div>
            </div>
            <div class="tabs">
              <button class="tab active" onclick="showTab('skills',this)">المهارات</button>
              <button class="tab" onclick="showTab('comparison',this)">المقارنة</button>
              <button class="tab" onclick="showTab('development',this)">التطور</button>
            </div>
            <div id="tab-content">
              <div class="card">
                <h3 style="margin-bottom:16px">خريطة المهارات</h3>
                <canvas id="radarChart" height="200"></canvas>
              </div>
            </div>
          </div>
        `;
        setTimeout(() => {
          const ctx = document.getElementById('radarChart').getContext('2d');
          new Chart(ctx, {
            type: 'radar',
            data: {
              labels: ['السرعة', 'التمرير', 'التسديد', 'المراوغة', 'التمركز', 'اللياقة', 'الرؤية', 'الدفاع'],
              datasets: [{ label: 'المهارات', data: [a.speed, a.passing, a.shooting, a.dribbling, a.positioning, a.stamina, a.vision, a.defending], backgroundColor: 'rgba(0,230,118,0.2)', borderColor: '#00e676', pointBackgroundColor: '#00e676' }]
            },
            options: { scales: { r: { beginAtZero: true, max: 100, ticks: { display: false } } }, plugins: { legend: { display: false } } }
          });
        }, 100);
      }
      
      else if (state.page === 'scout') {
        const players = [
          { name: 'عبدالله الشمري', age: 17, position: 'مهاجم', city: 'الرياض' },
          { name: 'فيصل القحطاني', age: 16, position: 'وسط', city: 'جدة' },
          { name: 'محمد الدوسري', age: 19, position: 'مدافع', city: 'الدمام' },
        ];
        app.innerHTML = `
          <div class="container">
            <button onclick="goHome()" style="background:none;border:none;color:#00e676;cursor:pointer;margin-bottom:20px;">← الرئيسية</button>
            <h2 style="margin-bottom:24px">🔍 لوحة الكشاف</h2>
            ${players.map((p,i) => {
              const a = generateAnalysis(p.name, p.age, p.position);
              const c = a.overall >= 80 ? '#00e676' : a.overall >= 65 ? '#ffc107' : '#ff5252';
              return `
                <div class="card" onclick="viewPlayer('${p.name}',${p.age},'${p.position}','${p.city}')" style="cursor:pointer">
                  <div style="display:flex;justify-content:space-between;align-items:center">
                    <div>
                      <div style="font-weight:700">${i+1}. ${p.name}</div>
                      <span style="background:#00e67622;color:#00e676;padding:3px 10px;border-radius:20px;font-size:11px">${p.position}</span>
                    </div>
                    <div style="width:50px;height:50px;border-radius:50%;border:2px solid ${c};display:flex;align-items:center;justify-content:center">
                      <span style="font-weight:800;color:${c}">${a.overall}</span>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }
    }
    
    function generateAnalysis(n, a, p) {
      const r = (min, max) => Math.round(min + Math.random() * (max - min));
      const s = r(55, 95), pas = r(50, 92), sho = r(45, 96), dri = r(50, 93), pos = r(55, 90), sta = r(60, 95), vis = r(50, 88), def = p === 'مدافع' ? r(70, 95) : r(35, 70);
      const overall = Math.round((s + pas + sho + dri + pos + sta + vis + def) / 8);
      return { overall, speed: s, passing: pas, shooting: sho, dribbling: dri, positioning: pos, stamina: sta, vision: vis, defending: def };
    }
    
    function goHome() { state.page = 'home'; render(); }
    function goUpload() { state.page = 'upload'; render(); }
    function goScout() { state.page = 'scout'; render(); }
    
    function startAnalyze() {
      const name = document.getElementById('name').value;
      const age = parseInt(document.getElementById('age').value);
      const position = document.getElementById('position').value;
      if (!name || !age) return alert('املأ البيانات');
      state.player = { name, age, position, city: 'الرياض' };
      state.page = 'analyzing';
      render();
    }
    
    function viewPlayer(name, age, position, city) {
      state.player = { name, age, position, city };
      state.page = 'analyzing';
      render();
    }
    
    function showTab(tab, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
    }
    
    render();
  </script>
</body>
</html>
