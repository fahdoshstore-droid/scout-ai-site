<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCOUT AI — اكتشف المواهب</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1a; font-family: 'Noto Kufi Arabic', sans-serif; color: #f0f4f8; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .btn { background: linear-gradient(135deg, #00e676, #00c853); color: #0a0f1a; padding: 14px 36px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin: 5px; }
    .btn-outline { background: transparent; border: 2px solid #00e676; color: #00e676; }
    .card { background: #111827; padding: 20px; border-radius: 16px; margin: 15px 0; border: 1px solid #1e2a3a; }
    .text-center { text-align: center; }
    .flex { display: flex; justify-content: space-between; align-items: center; }
    .input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #1e2a3a; background: #0a0f1a; color: #f0f4f8; margin: 8px 0; }
    .upload-zone { border: 2px dashed #1e2a3a; border-radius: 16px; padding: 40px; text-align: center; cursor: pointer; }
    .upload-zone:hover { border-color: #00e676; }
    h1 { font-size: 42px; margin-bottom: 10px; }
    h2 { font-size: 24px; margin-bottom: 15px; }
    .green { color: #00e676; }
    .logo { width: 80px; height: 80px; background: linear-gradient(135deg, #00e676, #00c853); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 20px; }
    .score { font-size: 42px; font-weight: bold; color: #00e676; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; background: #00e67622; color: #00e676; margin: 2px; }
    .badge-info { background: #42a5f522; color: #42a5f5; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // State
    let page = 'home';
    let player = null;
    let analysis = null;
    
    // Generate random analysis
    function gen(n, a, p) {
      const r = (min, max) => Math.round(min + Math.random() * (max - min));
      return {
        speed: r(55, 95), passing: r(50, 92), shooting: r(45, 96), dribbling: r(50, 93),
        positioning: r(55, 90), stamina: r(60, 95), vision: r(50, 88),
        defending: p === 'مدافع' ? r(70, 95) : r(35, 70),
        overall: r(65, 90), sportDNA: p
      };
    }
    
    // Render
    function render() {
      const app = document.getElementById('app');
      
      if (page === 'home') {
        app.innerHTML = `
          <div class="container text-center" style="padding-top:80px">
            <div class="logo">⚡</div>
            <h1>SCOUT <span class="green">AI</span></h1>
            <p style="color:#8892a4;margin-bottom:40px">اكتشف المواهب الرياضية بالذكاء الاصطناعي</p>
            <button class="btn" onclick="go('upload')">🎬 ارفع فيديو</button>
            <button class="btn btn-outline" onclick="go('scout')">🔍 الكشاف</button>
          </div>
        `;
      }
      
      else if (page === 'upload') {
        app.innerHTML = `
          <div class="container">
            <button onclick="go('home')" style="background:none;border:none;color:#00e676;cursor:pointer;margin-bottom:20px">← الرئيسية</button>
            <h2>تحليل موهبة جديدة</h2>
            <div class="upload-zone" onclick="document.getElementById('file').click()">
              <div style="font-size:36px">🎥</div>
              <div>ارفع فيديو اللاعب</div>
              <input type="file" id="file" accept="video/*" style="display:none">
            </div>
            <div class="card">
              <input class="input" id="name" placeholder="اسم اللاعب">
              <input class="input" id="age" type="number" placeholder="العمر">
              <select class="input" id="pos">
                <option value="مهاجم">مهاجم</option>
                <option value="وسط">وسط</option>
                <option value="مدافع">مدافع</option>
                <option value="حارس مرمي">حارس مرمي</option>
              </select>
            </div>
            <button class="btn" style="width:100%" onclick="analyze()">⚡ ابدأ التحليل</button>
          </div>
        `;
      }
      
      else if (page === 'analyzing') {
        app.innerHTML = `
          <div class="container text-center" style="padding-top:80px">
            <div style="width:100px;height:100px;border:4px solid #1e2a3a;border-top-color:#00e676;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 30px"></div>
            <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
            <h2>جاري تحليل ${player?.name || ''}...</h2>
          </div>
        `;
        setTimeout(() => {
          analysis = gen(player.name, player.age, player.position);
          page = 'report';
          render();
        }, 2500);
      }
      
      else if (page === 'report') {
        app.innerHTML = `
          <div class="container">
            <button onclick="go('home')" style="background:none;border:none;color:#00e676;cursor:pointer;margin-bottom:20px">← الرئيسية</button>
            <div class="card">
              <div class="flex">
                <div>
                  <h2>${player.name}</h2>
                  <span class="badge">${player.position}</span>
                  <span class="badge badge-info">${player.city}</span>
                </div>
                <div class="score">${analysis.overall}</div>
              </div>
            </div>
            <div class="card">
              <h3 style="margin-bottom:15px">خريطة المهارات</h3>
              <canvas id="chart" height="200"></canvas>
            </div>
            <div class="card">
              <h3>🧬 Sport DNA</h3>
              <p style="color:#8892a4">المركز الأنسب: <span class="green">${analysis.sportDNA}</span></p>
            </div>
          </div>
        `;
        setTimeout(() => {
          new Chart(document.getElementById('chart'), {
            type: 'radar',
            data: {
              labels: ['السرعة','التمرير','التسديد','المراوغة','التمركز','اللياقة','الرؤية','الدفاع'],
              datasets: [{ label: 'المهارات', data: [analysis.speed,analysis.passing,analysis.shooting,analysis.dribbling,analysis.positioning,analysis.stamina,analysis.vision,analysis.defending], backgroundColor: '#00e67633', borderColor: '#00e676', pointBackgroundColor: '#00e676' }]
            },
            options: { scales: { r: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
          });
        }, 100);
      }
      
      else if (page === 'scout') {
        const players = [
          {name:'عبدالله الشمري',age:17,pos:'مهاجم',city:'الرياض'},
          {name:'فيصل القحطاني',age:16,pos:'وسط',city:'جدة'},
          {name:'خالد العتيبي',age:15,pos:'حارس مرمي',city:'مكة'}
        ];
        app.innerHTML = `
          <div class="container">
            <button onclick="go('home')" style="background:none;border:none;color:#00e676;cursor:pointer;margin-bottom:20px">← الرئيسية</button>
            <h2>🔍 لوحة الكشاف</h2>
            ${players.map((p,i) => {
              const a = gen(p.name, p.age, p.pos);
              return `<div class="card" onclick="view('${p.name}',${p.age},'${p.pos}','${p.city}')" style="cursor:pointer">
                <div class="flex">
                  <div><b>${i+1}. ${p.name}</b><br><span class="badge">${p.pos}</span></div>
                  <div class="score" style="font-size:28px">${a.overall}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
        `;
      }
    }
    
    function go(p) { page = p; render(); }
    
    function analyze() {
      const name = document.getElementById('name').value;
      const age = parseInt(document.getElementById('age').value);
      const position = document.getElementById('pos').value;
      if (!name || !age) return alert('املأ البيانات!');
      player = { name, age, position, city: 'الرياض' };
      page = 'analyzing';
      render();
    }
    
    function view(n,a,p,c) {
      player = { name:n, age:a, position:p, city:c };
      page = 'analyzing';
      render();
    }
    
    // Start
    render();
  </script>
</body>
</html>
