<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCOUT AI — اكتشف المواهب</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1a; font-family: 'Noto Kufi Arabic', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
    import { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar } from 'https://esm.sh/recharts@2.7.3';

    const COLORS = { 
      bg: "#0a0f1a", card: "#111827", cardHover: "#1a2236",
      accent: "#00e676", accentDim: "#00c853", accentGlow: "rgba(0, 230, 118, 0.15)",
      text: "#f0f4f8", textDim: "#8892a4", border: "#1e2a3a", 
      warning: "#ffc107", danger: "#ff5252", info: "#42a5f5"
    };
    
    const POSITIONS = ["مهاجم", "وسط", "مدافع", "حارس مرمي"];
    const SPORTS = ["كرة قدم", "كرة سلة", "كرة طائرة", "سباحة", "ألعاب قوى"];
    const CITIES = ["الرياض", "جدة", "الدمام", "مكة", "المدينة", "الخبر", "أبها", "تبوك"];

    const generateAnalysis = (n, a, p) => {
      const r = (min, max) => Math.round(min + (Math.random() * (max - min)));
      const s = r(55, 95), pas = r(50, 92), sho = r(45, 96), dri = r(50, 93), pos = r(55, 90), sta = r(60, 95), vis = r(50, 88), def = p === "مدافع" || p === "حارس مرمي" ? r(70, 95) : r(35, 70);
      const overall = Math.round((s + pas + sho + dri + pos + sta + vis + def) / 8);
      return {
        overall, radarData: [
          { attr: "السرعة", value: s }, { attr: "التمرير", value: pas }, { attr: "التسديد", value: sho }, 
          { attr: "المراوغة", value: dri }, { attr: "التمركز", value: pos }, { attr: "اللياقة", value: sta }, 
          { attr: "الرؤية", value: vis }, { attr: "الدفاع", value: def }
        ],
        speed: s, passing: pas, shooting: sho, dribbling: dri, positioning: pos, stamina: sta, vision: vis, defending: def,
        strengths: ["السرعة", "التسديد", "المراوغة"], weaknesses: ["الدفاع"],
        recommendation: overall >= 80 ? "موهبة استثنائية — مرشح للاحتراف" : overall >= 65 ? "موهبة واعدة — يحتاج تطوير" : "مستوى جيد — يحتاج تدريب مكثف",
        sportDNA: overall >= 75 ? p : p === "مهاجم" ? "جناح" : "وسط دفاعي",
        benchmarkScore: a <= 16 ? 62 : a <= 18 ? 68 : 73,
        benchmarkAge: a <= 16 ? "U-17" : a <= 18 ? "U-19" : a <= 21 ? "U-21" : "Senior",
        aboveBenchmark: overall >= (a <= 16 ? 62 : a <= 18 ? 68 : 73),
        progressData: [
          { month: "يناير", score: overall - r(5, 15) }, { month: "فبراير", score: overall - r(3, 12) },
          { month: "مارس", score: overall - r(2, 8) }, { month: "أبريل", score: overall - r(0, 5) },
          { month: "مايو", score: overall }, { month: "يونيو", score: overall + r(0, 3) },
        ]
      };
    };

    const SAMPLE = [
      { id: 1, name: "عبدالله الشمري", age: 17, city: "الرياض", position: "مهاجم" },
      { id: 2, name: "فيصل القحطاني", age: 16, city: "جدة", position: "وسط" },
      { id: 3, name: "محمد الدوسري", age: 19, city: "الدمام", position: "مدافع" },
      { id: 4, name: "خالد العتيبي", age: 15, city: "مكة", position: "حارس مرمي" },
      { id: 5, name: "سلطان الحربي", age: 18, city: "الخبر", position: "مهاجم" },
    ];

    function GlowOrb({ style }) {
      return <div style={{ position: "absolute", width: 300, height: 300, borderRadius: "50%", background: `radial-gradient(circle, ${COLORS.accentGlow}, transparent 70%)`, filter: "blur(60px)", pointerEvents: "none", zIndex: 0, ...style }} />;
    }

    function Badge({ c = COLORS.accent, children }) { 
      return <span style={{ display: "inline-block", padding: "3px 10px", borderRadius: 20, fontSize: 11, background: c + "22", color: c, border: "1px solid " + c + "44", marginRight: 6 }}>{children}</span>; 
    }
    
    function StatBar({ l, v }) { 
      return (<div style={{ marginBottom: 10 }}><div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}><span style={{ color: COLORS.textDim, fontSize: 13 }}>{l}</span><span style={{ color: COLORS.text, fontSize: 13, fontWeight: 700 }}>{v}</span></div><div style={{ height: 6, background: COLORS.border, borderRadius: 3 }}><div style={{ height: "100%", width: v + "%", background: v >= 80 ? COLORS.accent : v >= 60 ? COLORS.warning : COLORS.danger, borderRadius: 3, transition: "width 1.2s" }} /></div></div>); 
    }
    
    function Card({ onClick, h, children, style }) { 
      const [H, setH] = useState(false); 
      return (<div onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)} style={{ background: H && h ? COLORS.cardHover : COLORS.card, border: "1px solid " + (H && h ? COLORS.accent + "44" : COLORS.border), borderRadius: 16, padding: 24, cursor: onClick ? "pointer" : "default", transition: "all 0.3s", transform: H && h ? "translateY(-2px)" : "none", boxShadow: H && h ? "0 8px 30px " + COLORS.accentGlow : "none", ...style }}>{children}</div>); 
    }

    function Landing({ onNavigate }) {
      const [v, setV] = useState(false);
      useEffect(() => { setTimeout(() => setV(true), 100); }, []);
      return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20, textAlign: "center", position: "relative", overflow: "hidden" }}>
          <GlowOrb style={{ top: -100, left: -100 }} />
          <GlowOrb style={{ bottom: -100, right: -100 }} />
          <div style={{ opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(30px)", transition: "all 0.8s", zIndex: 1 }}>
            <div style={{ width: 90, height: 90, borderRadius: "50%", background: "linear-gradient(135deg, #00e676, #00c853)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 24px", boxShadow: "0 0 40px rgba(0, 230, 118, 0.15)" }}><span style={{ fontSize: 40 }}>⚡</span></div>
            <h1 style={{ fontSize: "clamp(32px, 6vw, 56px)", fontWeight: 800, color: COLORS.text, margin: "0 0 8px", letterSpacing: -1 }}>SCOUT <span style={{ color: COLORS.accent }}>AI</span></h1>
            <p style={{ color: COLORS.textDim, margin: "0 0 40px", maxWidth: 500, lineHeight: 1.8 }}>اكتشف المواهب الرياضية بالذكاء الاصطناعي<br/>ارفع فيديو — احصل على تقرير أداء احترافي</p>
            <div style={{ display: "flex", gap: 16, justifyContent: "center", flexWrap: "wrap" }}>
              <button onClick={() => onNavigate("upload")} style={{ padding: "14px 36px", borderRadius: 12, border: "none", background: "linear-gradient(135deg, #00e676, #00c853)", color: COLORS.bg, fontSize: 16, fontWeight: 700, cursor: "pointer", boxShadow: "0 4px 20px rgba(0, 230, 118, 0.15)" }}>🎬 ارفع فيديو للتحليل</button>
              <button onClick={() => onNavigate("scout")} style={{ padding: "14px 36px", borderRadius: 12, border: "2px solid #00e67644", background: "transparent", color: COLORS.accent, fontSize: 16, fontWeight: 600, cursor: "pointer" }}>🔍 دخول الكشاف</button>
            </div>
            <div style={{ display: "flex", gap: 40, justifyContent: "center", marginTop: 60, flexWrap: "wrap" }}>
              {[{ n: "2,400+", l: "لاعب مسجل" }, { n: "180+", l: "نادي وأكاديمية" }, { n: "95%", l: "دقة التحليل" }].map((s, i) => (
                <div key={i} style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 28, fontWeight: 800, color: COLORS.accent }}>{s.n}</div>
                  <div style={{ fontSize: 12, color: COLORS.textDim, marginTop: 4 }}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function Upload({ onNavigate, onAnalyze }) {
      const [f, setF] = useState({ name: "", age: "", city: CITIES[0], position: POSITIONS[0], sport: SPORTS[0] });
      const [videoFile, setVideoFile] = useState(null);
      const [dragOver, setDragOver] = useState(false);
      const fileRef = useRef(null);
      
      const inputStyle = { width: "100%", padding: "12px 14px", borderRadius: 10, border: "1px solid " + COLORS.border, background: COLORS.bg, color: COLORS.text, fontSize: 14, outline: "none", boxSizing: "border-box" };
      
      return (
        <div style={{ minHeight: "100vh", padding: "40px 20px", maxWidth: 600, margin: "0 auto" }}>
          <button onClick={() => onNavigate("home")} style={{ background: "none", border: "none", color: COLORS.accent, cursor: "pointer", fontSize: 14, marginBottom: 20 }}>← الرئيسية</button>
          <h2 style={{ fontSize: 28, fontWeight: 800, color: COLORS.text, margin: "0 0 8px" }}>تحليل موهبة جديدة</h2>
          <p style={{ color: COLORS.textDim, fontSize: 14, margin: "0 0 32px" }}>ارفع فيديو اللاعب واملأ البيانات — الذكاء الاصطناعي يحلل الباقي</p>
          
          {/* Video Upload Zone */}
          <div onDragOver={e => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)} onDrop={e => { e.preventDefault(); setDragOver(false); setVideoFile(e.dataTransfer.files[0]); }} onClick={() => fileRef.current?.click()}
            style={{ border: "2px dashed " + (dragOver ? COLORS.accent : COLORS.border), borderRadius: 16, padding: 40, textAlign: "center", cursor: "pointer", background: dragOver ? COLORS.accentGlow : COLORS.card, transition: "all 0.3s", marginBottom: 24 }}>
            <input ref={fileRef} type="file" accept="video/*,image/*" style={{ display: "none" }} onChange={e => setVideoFile(e.target.files[0])} />
            <div style={{ fontSize: 40, marginBottom: 12 }}>{videoFile ? "✅" : "🎥"}</div>
            <div style={{ color: videoFile ? COLORS.accent : COLORS.textDim, fontSize: 14 }}>{videoFile ? videoFile.name : "اسحب الفيديو هنا أو اضغط للاختيار"}</div>
            <div style={{ color: COLORS.textDim, fontSize: 11, marginTop: 8 }}>MP4, MOV, JPG, PNG — حد أقصى 100MB</div>
          </div>
          
          <Card style={{ marginBottom: 16 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <div style={{ gridColumn: "1 / -1" }}>
                <label style={{ fontSize: 12, color: COLORS.textDim, display: "block", marginBottom: 6 }}>اسم اللاعب</label>
                <input value={f.name} onChange={e => setF({ ...f, name: e.target.value })} placeholder="مثال: محمد الأحمد" style={inputStyle} />
              </div>
              <div>
                <label style={{ fontSize: 12, color: COLORS.textDim, display: "block", marginBottom: 6 }}>العمر</label>
                <input type="number" value={f.age} onChange={e => setF({ ...f, age: e.target.value })} placeholder="17" style={inputStyle} />
              </div>
              <div>
                <label style={{ fontSize: 12, color: COLORS.textDim, display: "block", marginBottom: 6 }}>المدينة</label>
                <select value={f.city} onChange={e => setF({ ...f, city: e.target.value })} style={inputStyle}>
                  {CITIES.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label style={{ fontSize: 12, color: COLORS.textDim, display: "block", marginBottom: 6 }}>الرياضة</label>
                <select value={f.sport} onChange={e => setF({ ...f, sport: e.target.value })} style={inputStyle}>
                  {SPORTS.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div style={{ gridColumn: "1 / -1" }}>
                <label style={{ fontSize: 12, color: COLORS.textDim, display: "block", marginBottom: 6 }}>المركز</label>
                <select value={f.position} onChange={e => setF({ ...f, position: e.target.value })} style={inputStyle}>
                  {POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}
                </select>
              </div>
            </div>
          </Card>
          
          <button onClick={() => f.name && f.age && onAnalyze({ ...f, age: parseInt(f.age) })} disabled={!f.name || !f.age} 
            style={{ width: "100%", padding: 16, borderRadius: 12, border: "none", background: f.name && f.age ? "linear-gradient(135deg, #00e676, #00c853)" : COLORS.border, color: f.name && f.age ? COLORS.bg : COLORS.textDim, fontSize: 16, fontWeight: 700, cursor: f.name && f.age ? "pointer" : "not-allowed", boxShadow: f.name && f.age ? "0 4px 20px rgba(0, 230, 118, 0.15)" : "none" }}>
            ⚡ ابدأ التحليل بالذكاء الاصطناعي
          </button>
        </div>
      );
    }

    function Analyzing({ player, onComplete }) {
      const [p, setP] = useState(0);
      const [step, setStep] = useState(0);
      const steps = ["جاري تحميل الفيديو…", "تحليل حركة اللاعب…", "قياس السرعة والتسارع…", "تقييم المهارات الفنية…", "مقارنة مع المعايير العمرية…", "إنشاء التقرير النهائي…"];
      
      useEffect(() => {
        const i = setInterval(() => {
          setP(x => {
            if (x >= 100) {
              clearInterval(i);
              fetch("http://localhost:3000/api/analyze", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name: player.name, age: player.age, position: player.position }) })
                .then(r => r.json()).then(d => setTimeout(() => onComplete(d.analysis || generateAnalysis(player.name, player.age, player.position)), 500))
                .catch(() => setTimeout(() => onComplete(generateAnalysis(player.name, player.age, player.position)), 500));
              return 100;
            }
            return x + 2;
          });
        }, 80);
        return () => clearInterval(i);
      }, []);
      
      useEffect(() => { setStep(Math.min(Math.floor(p / (100 / steps.length)), steps.length - 1)); }, [p]);
      
      return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 40, textAlign: "center" }}>
          <GlowOrb style={{ top: "30%", left: "30%" }} />
          <div style={{ width: 120, height: 120, borderRadius: "50%", border: "3px solid " + COLORS.border, borderTopColor: COLORS.accent, animation: "spin 1s linear infinite", marginBottom: 32 }} />
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
          <h2 style={{ color: COLORS.text, fontSize: 24, fontWeight: 700, margin: "0 0 8px" }}>جاري تحليل {player.name}</h2>
          <p style={{ color: COLORS.accent, marginBottom: 32, minHeight: 20 }}>{steps[step]}</p>
          <div style={{ width: 300, height: 8, background: COLORS.border, borderRadius: 4, overflow: "hidden" }}>
            <div style={{ height: "100%", width: p + "%", background: "linear-gradient(90deg, #00e676, #00c853)", borderRadius: 4, transition: "width 0.1s" }} />
          </div>
          <p style={{ fontFamily: "monospace", color: COLORS.textDim, marginTop: 12 }}>{p}%</p>
        </div>
      );
    }

    function Report({ player, analysis, onNavigate }) {
      const [tab, setTab] = useState("skills");
      const c = analysis.overall >= 80 ? COLORS.accent : analysis.overall >= 65 ? COLORS.warning : COLORS.danger;
      
      return (
        <div style={{ minHeight: "100vh", padding: "40px 20px", maxWidth: 700, margin: "0 auto" }}>
          <button onClick={() => onNavigate("home")} style={{ background: "none", border: "none", color: COLORS.accent, cursor: "pointer", marginBottom: 20 }}>← الرئيسية</button>
          
          {/* Player Header */}
          <Card style={{ marginBottom: 20, position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: -30, left: -30, width: 120, height: 120, borderRadius: "50%", background: c + "11", filter: "blur(30px)" }} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 16 }}>
              <div>
                <h2 style={{ color: COLORS.text, fontSize: 26, fontWeight: 800, margin: "0 0 6px" }}>{player.name}</h2>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <Badge>{player.position}</Badge>
                  <Badge c={COLORS.info}>{player.city}</Badge>
                  <Badge c={COLORS.warning}>{player.age} سنة</Badge>
                </div>
              </div>
              <div style={{ textAlign: "center" }}>
                <div style={{ width: 80, height: 80, borderRadius: "50%", border: "3px solid " + c, display: "flex", alignItems: "center", justifyContent: "center", background: c + "11" }}>
                  <span style={{ fontSize: 30, fontWeight: 800, color: c }}>{analysis.overall}</span>
                </div>
                <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 4 }}>التقييم العام</div>
              </div>
            </div>
            <div style={{ marginTop: 16, padding: "12px 16px", borderRadius: 10, background: c + "11", border: "1px solid " + c + "33" }}>
              <span style={{ color: c, fontWeight: 600 }}>🎯 {analysis.recommendation}</span>
            </div>
          </Card>
          
          {/* Tabs */}
          <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
            {[{ k: "skills", l: "المهارات" }, { k: "comparison", l: "المقارنة" }, { k: "development", l: "التطور" }].map(t => (
              <button key={t.k} onClick={() => setTab(t.k)} style={{ flex: 1, padding: 12, borderRadius: 10, border: "none", background: tab === t.k ? COLORS.accent : COLORS.card, color: tab === t.k ? COLORS.bg : COLORS.textDim, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>{t.l}</button>
            ))}
          </div>
          
          {/* Skills Tab */}
          {tab === "skills" && (
            <>
              <Card style={{ marginBottom: 20 }}>
                <h3 style={{ color: COLORS.text, margin: "0 0 16px" }}>خريطة المهارات</h3>
                <ResponsiveContainer width="100%" height={280}>
                  <RadarChart data={analysis.radarData}>
                    <PolarGrid stroke={COLORS.border} />
                    <PolarAngleAxis dataKey="attr" tick={{ fill: COLORS.textDim, fontSize: 11 }} />
                    <PolarRadiusAxis angle={90} domain={[0, 100]} tick={false} />
                    <Radar dataKey="value" stroke={COLORS.accent} fill={COLORS.accent} fillOpacity={0.2} />
                  </RadarChart>
                </ResponsiveContainer>
              </Card>
              <Card style={{ marginBottom: 20 }}>
                <StatBar l="السرعة" v={analysis.speed} />
                <StatBar l="التمرير" v={analysis.passing} />
                <StatBar l="التسديد" v={analysis.shooting} />
                <StatBar l="المراوغة" v={analysis.dribbling} />
                <StatBar l="التمركز" v={analysis.positioning} />
                <StatBar l="اللياقة" v={analysis.stamina} />
                <StatBar l="الرؤية" v={analysis.vision} />
                <StatBar l="الدفاع" v={analysis.defending} />
              </Card>
            </>
          )}
          
          {/* Comparison Tab */}
          {tab === "comparison" && (
            <Card style={{ marginBottom: 20 }}>
              <h3 style={{ color: COLORS.text, margin: "0 0 16px" }}>المقارنة مع المعايير ({analysis.benchmarkAge})</h3>
              <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                <div style={{ flex: 1, height: 12, background: COLORS.border, borderRadius: 6, position: "relative", overflow: "hidden" }}>
                  <div style={{ position: "absolute", height: "100%", width: analysis.benchmarkScore + "%", background: COLORS.textDim + "44", borderRadius: 6 }} />
                  <div style={{ position: "absolute", height: "100%", width: analysis.overall + "%", background: analysis.aboveBenchmark ? COLORS.accent : COLORS.warning, borderRadius: 6 }} />
                </div>
                <Badge c={analysis.aboveBenchmark ? COLORS.accent : COLORS.warning}>{analysis.aboveBenchmark ? "فوق المعيار ↑" : "تحت المعيار ↓"}</Badge>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 11, color: COLORS.textDim }}>
                <span>معيار {analysis.benchmarkAge}: {analysis.benchmarkScore}</span>
                <span>اللاعب: {analysis.overall}</span>
              </div>
              <div style={{ marginTop: 24, textAlign: "center", color: COLORS.accent, fontSize: 24, fontWeight: 800 }}>
                {analysis.overall >= analysis.benchmarkScore ? "+" : ""}{analysis.overall - analysis.benchmarkScore} نقاط
              </div>
            </Card>
          )}
          
          {/* Development Tab */}
          {tab === "development" && (
            <Card style={{ marginBottom: 20 }}>
              <h3 style={{ color: COLORS.text, margin: "0 0 16px" }}>تطور الأداء</h3>
              <ResponsiveContainer width="100%" height={200}>
                <LineChart data={analysis.progressData}>
                  <XAxis dataKey="month" tick={{ fill: COLORS.textDim, fontSize: 11 }} axisLine={false} tickLine={false} />
                  <YAxis domain={[40, 100]} tick={{ fill: COLORS.textDim, fontSize: 11 }} axisLine={false} tickLine={false} />
                  <Tooltip contentStyle={{ background: COLORS.card, border: "1px solid " + COLORS.border, borderRadius: 8 }} />
                  <Line type="monotone" dataKey="score" stroke={COLORS.accent} strokeWidth={3} dot={{ fill: COLORS.accent, r: 4 }} />
                </LineChart>
              </ResponsiveContainer>
            </Card>
          )}
          
          {/* Sport DNA */}
          <Card>
            <h3 style={{ color: COLORS.text, margin: "0 0 8px" }}>🧬 Sport DNA</h3>
            <p style={{ color: COLORS.textDim }}>المركز الأنسب بناءً على التحليل: <strong style={{ color: COLORS.accent }}>{analysis.sportDNA}</strong></p>
          </Card>
        </div>
      );
    }

    function Scout({ onNavigate }) {
      const [sp, setSp] = useState(null);
      const players = SAMPLE.map(p => ({ ...p, analysis: generateAnalysis(p.name, p.age, p.position) }));
      if (sp) return <Report player={sp} analysis={sp.analysis} onNavigate={() => setSp(null)} />;
      return (
        <div style={{ minHeight: "100vh", padding: "40px 20px", maxWidth: 900, margin: "0 auto" }}>
          <button onClick={() => onNavigate("home")} style={{ background: "none", border: "none", color: COLORS.accent, cursor: "pointer", marginBottom: 20 }}>← الرئيسية</button>
          <h2 style={{ fontSize: 28, fontWeight: 800, color: COLORS.text, margin: "0 0 8px" }}>🔍 لوحة الكشاف</h2>
          <p style={{ color: COLORS.textDim, margin: "0 0 24px" }}>تصفّح المواهب المسجلة وتواصل مع اللاعبين</p>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 16 }}>
            {players.map((p, i) => { 
              const c = p.analysis.overall >= 80 ? COLORS.accent : p.analysis.overall >= 65 ? COLORS.warning : COLORS.danger;
              return (
                <Card key={p.id} h onClick={() => setSp(p)}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                    <div>
                      <div style={{ fontWeight: 700, color: COLORS.text, marginBottom: 6 }}>
                        {i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : ""} {p.name}
                      </div>
                      <Badge>{p.position}</Badge>
                      <Badge c={COLORS.info}>{p.city}</Badge>
                    </div>
                    <div style={{ width: 50, height: 50, borderRadius: "50%", border: "2px solid " + c, display: "flex", alignItems: "center", justifyContent: "center", background: c + "11" }}>
                      <span style={{ fontWeight: 800, color: c }}>{p.analysis.overall}</span>
                    </div>
                  </div>
                  <div style={{ fontSize: 12, color: COLORS.textDim, marginBottom: 8 }}>{p.age} سنة • {p.sport || "كرة قدم"}</div>
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                    {p.analysis.strengths.slice(0, 2).map((s, j) => (
                      <span key={j} style={{ fontSize: 10, color: COLORS.accent, background: COLORS.accent + "11", padding: "2px 8px", borderRadius: 10 }}>{s}</span>
                    ))}
                  </div>
                  <div style={{ marginTop: 12, fontSize: 11, color: COLORS.accent, textAlign: "center", padding: "6px", background: COLORS.accent + "08", borderRadius: 8 }}>اضغط لعرض التقرير ←</div>
                </Card>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState("home");
      const [player, setPlayer] = useState(null);
      const [analysis, setAnalysis] = useState(null);
      return (
        <div style={{ background: COLORS.bg, minHeight: "100vh", direction: "rtl" }}>
          {page === "home" && <Landing onNavigate={setPage} />}
          {page === "upload" && <Upload onNavigate={setPage} onAnalyze={p => { setPlayer(p); setPage("analyzing"); }} />}
          {page === "analyzing" && <Analyzing player={player} onComplete={r => { setAnalysis(r); setPage("report"); }} />}
          {page === "report" && <Report player={player} analysis={analysis} onNavigate={setPage} />}
          {page === "scout" && <Scout onNavigate={setPage} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
