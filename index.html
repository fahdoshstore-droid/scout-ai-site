<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCOUT AI — اكتشف المواهب</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1a; font-family: 'Noto Kufi Arabic', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
    import { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar } from 'https://esm.sh/recharts@2.7.3';

    const COLORS = { bg: "#0a0f1a", card: "#111827", accent: "#00e676", text: "#f0f4f8", textDim: "#8892a4", border: "#1e2a3a", warning: "#ffc107", danger: "#ff5252", info: "#42a5f5" };
    const POSITIONS = ["مهاجم", "وسط", "مدافع", "حارس مرمي"];
    const CITIES = ["الرياض", "جدة", "الدمام", "مكة", "المدينة"];

    function generateAnalysis(n, a, p) {
      const r = (min, max) => Math.round(min + (Math.random() * (max - min)));
      const s = r(55, 95), pas = r(50, 92), sho = r(45, 96), dri = r(50, 93), pos = r(55, 90), sta = r(60, 95), vis = r(50, 88), def = p === "مدافع" ? r(70, 95) : r(35, 70);
      const overall = Math.round((s + pas + sho + dri + pos + sta + vis + def) / 8);
      return {
        overall, radarData: [{ attr: "السرعة", value: s }, { attr: "التمرير", value: pas }, { attr: "التسديد", value: sho }, { attr: "المراوغة", value: dri }, { attr: "التمركز", value: pos }, { attr: "اللياقة", value: sta }, { attr: "الرؤية", value: vis }, { attr: "الدفاع", value: def }],
        speed: s, passing: pas, shooting: sho, dribbling: dri, positioning: pos, stamina: sta, vision: vis, defending: def,
        strengths: ["السرعة", "التسديد", "المراوغة"], weaknesses: ["الدفاع"],
        recommendation: overall >= 80 ? "موهبة استثنائية" : overall >= 65 ? "موهبة واعدة" : "يحتاج تدريب",
        sportDNA: overall >= 75 ? p : "وسط دفاعي", benchmarkScore: 70, aboveBenchmark: overall >= 70
      };
    }

    const SAMPLE = [{ id: 1, name: "عبدالله الشمري", age: 17, city: "الرياض", position: "مهاجم" }, { id: 2, name: "فيصل القحطاني", age: 16, city: "جدة", position: "وسط" }, { id: 3, name: "محمد الدوسري", age: 19, city: "الدمام", position: "مدافع" }];

    function Badge({ c = COLORS.accent, children }) { return <span style={{ display: "inline-block", padding: "3px 10px", borderRadius: 20, fontSize: 11, background: c + "22", color: c, border: "1px solid " + c + "44", marginRight: 6 }}>{children}</span>; }
    function StatBar({ l, v }) { return (<div style={{ marginBottom: 10 }}><div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}><span style={{ color: COLORS.textDim, fontSize: 13 }}>{l}</span><span style={{ color: COLORS.text, fontSize: 13, fontWeight: 700 }}>{v}</span></div><div style={{ height: 6, background: COLORS.border, borderRadius: 3 }}><div style={{ height: "100%", width: v + "%", background: v >= 80 ? COLORS.accent : v >= 60 ? COLORS.warning : COLORS.danger, borderRadius: 3 }} /></div></div>); }
    function Card({ onClick, h, children, style }) { const [H, setH] = useState(false); return (<div onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)} style={{ background: H && h ? "#1a2236" : COLORS.card, border: "1px solid " + (H && h ? COLORS.accent + "44" : COLORS.border), borderRadius: 16, padding: 24, cursor: onClick ? "pointer" : "default", transition: "all 0.3s", ...style }}>{children}</div>); }

    function Landing({ onNavigate }) {
      const [v, setV] = useState(false);
      useEffect(() => { setTimeout(() => setV(true), 100); }, []);
      return (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20, textAlign: "center" }}>
          <div style={{ width: 90, height: 90, borderRadius: "50%", background: "linear-gradient(135deg, #00e676, #00c853)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 24px", boxShadow: "0 0 40px rgba(0, 230, 118, 0.15)" }}><span style={{ fontSize: 40 }}>⚡</span></div>
          <h1 style={{ fontSize: "clamp(32px, 6vw, 56px)", fontWeight: 800, color: COLORS.text, margin: "0 0 8px" }}>SCOUT <span style={{ color: COLORS.accent }}>AI</span></h1>
          <p style={{ color: COLORS.textDim, margin: "0 0 40px" }}>اكتشف المواهب الرياضية بالذكاء الاصطناعي</p>
          <div style={{ display: "flex", gap: 16 }}>
            <button onClick={() => onNavigate("upload")} style={{ padding: "14px 36px", borderRadius: 12, border: "none", background: "linear-gradient(135deg, #00e676, #00c853)", color: COLORS.bg, fontSize: 16, fontWeight: 700, cursor: "pointer" }}>🎬 ارفع فيديو</button>
            <button onClick={() => onNavigate("scout")} style={{ padding: "14px 36px", borderRadius: 12, border: "2px solid #00e67644", background: "transparent", color: COLORS.accent, fontSize: 16, fontWeight: 600, cursor: "pointer" }}>🔍 الكشاف</button>
          </div>
        </div>
      );
    }

    function Upload({ onNavigate, onAnalyze }) {
      const [f, setF] = useState({ name: "", age: "", city: CITIES[0], position: POSITIONS[0] });
      return (
        <div style={{ minHeight: "100vh", padding: "40px 20px", maxWidth: 600, margin: "0 auto" }}>
          <button onClick={() => onNavigate("home")} style={{ background: "none", border: "none", color: COLORS.accent, cursor: "pointer", marginBottom: 20 }}>← الرئيسية</button>
          <h2 style={{ fontSize: 28, fontWeight: 800, color: COLORS.text, margin: "0 0 24px" }}>تحليل موهبة</h2>
          <Card style={{ marginBottom: 16 }}>
            <div style={{ display: "grid", gap: 12 }}>
              <input value={f.name} onChange={(e) => setF({ ...f, name: e.target.value })} placeholder="اسم اللاعب" style={{ padding: "12px", borderRadius: 10, border: "1px solid " + COLORS.border, background: COLORS.bg, color: COLORS.text }} />
              <input type="number" value={f.age} onChange={(e) => setF({ ...f, age: e.target.value })} placeholder="العمر" style={{ padding: "12px", borderRadius: 10, border: "1px solid " + COLORS.border, background: COLORS.bg, color: COLORS.text }} />
              <select value={f.position} onChange={(e) => setF({ ...f, position: e.target.value })} style={{ padding: "12px", borderRadius: 10, border: "1px solid " + COLORS.border, background: COLORS.bg, color: COLORS.text }}>
                {POSITIONS.map(p => <option key={p} value={p}>{p}</option>)}
              </select>
            </div>
          </Card>
          <button onClick={() => f.name && f.age && onAnalyze({ ...f, age: parseInt(f.age) })} disabled={!f.name || !f.age} style={{ width: "100%", padding: 16, borderRadius: 12, border: "none", background: f.name && f.age ? COLORS.accent : COLORS.border, color: f.name && f.age ? COLORS.bg : COLORS.textDim, fontSize: 16, fontWeight: 700, cursor: f.name && f.age ? "pointer" : "not-allowed" }}>⚡ ابدأ التحليل</button>
        </div>
      );
    }

    function Analyzing({ player, onComplete }) {
      const [p, setP] = useState(0);
      useEffect(() => {
        const i = setInterval(() => {
          setP(x => {
            if (x >= 100) {
              clearInterval(i);
              fetch("http://localhost:3000/api/analyze", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name: player.name, age: player.age, position: player.position }) })
                .then(r => r.json()).then(d => setTimeout(() => onComplete(d.analysis || generateAnalysis(player.name, player.age, player.position)), 500))
                .catch(() => setTimeout(() => onComplete(generateAnalysis(player.name, player.age, player.position)), 500));
              return 100;
            }
            return x + 2;
          });
        }, 80);
        return () => clearInterval(i);
      }, []);
      return (<div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}><div style={{ width: 120, height: 120, borderRadius: "50%", border: "3px solid " + COLORS.border, borderTopColor: COLORS.accent, animation: "spin 1s linear infinite" }} /><style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style><h2 style={{ color: COLORS.text, marginTop: 32 }}>جاري تحليل {player.name}</h2><div style={{ width: 300, height: 8, background: COLORS.border, borderRadius: 4, marginTop: 24 }}><div style={{ height: "100%", width: p + "%", background: COLORS.accent, borderRadius: 4 }} /></div></div>);
    }

    function Report({ player, analysis, onNavigate }) {
      const c = analysis.overall >= 80 ? COLORS.accent : analysis.overall >= 65 ? COLORS.warning : COLORS.danger;
      return (
        <div style={{ minHeight: "100vh", padding: "40px 20px", maxWidth: 700, margin: "0 auto" }}>
          <button onClick={() => onNavigate("home")} style={{ background: "none", border: "none", color: COLORS.accent, cursor: "pointer", marginBottom: 20 }}>← الرئيسية</button>
          <Card style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div><h2 style={{ color: COLORS.text, margin: "0 0 8px" }}>{player.name}</h2><Badge>{player.position}</Badge><Badge c={COLORS.info}>{player.city}</Badge></div>
              <div style={{ width: 80, height: 80, borderRadius: "50%", border: "3px solid " + c, display: "flex", alignItems: "center", justifyContent: "center" }}><span style={{ fontSize: 30, fontWeight: 800, color: c }}>{analysis.overall}</span></div>
            </div>
          </Card>
          <Card style={{ marginBottom: 20 }}>
            <h3 style={{ color: COLORS.text, margin: "0 0 16px" }}>خريطة المهارات</h3>
            <ResponsiveContainer width="100%" height={280}>
              <RadarChart data={analysis.radarData}><PolarGrid stroke={COLORS.border} /><PolarAngleAxis dataKey="attr" tick={{ fill: COLORS.textDim, fontSize: 11 }} /><PolarRadiusAxis angle={90} domain={[0, 100]} tick={false} /><Radar dataKey="value" stroke={COLORS.accent} fill={COLORS.accent} fillOpacity={0.2} /></RadarChart>
            </ResponsiveContainer>
          </Card>
          <Card style={{ marginBottom: 20 }}>
            <StatBar l="السرعة" v={analysis.speed} /><StatBar l="التمرير" v={analysis.passing} /><StatBar l="التسديد" v={analysis.shooting} /><StatBar l="المراوغة" v={analysis.dribbling} /><StatBar l="اللياقة" v={analysis.stamina} />
          </Card>
          <Card><h3 style={{ color: COLORS.text, margin: "0 0 8px" }}>🧬 Sport DNA</h3><p style={{ color: COLORS.textDim }}>المركز الأنسب: <strong style={{ color: COLORS.accent }}>{analysis.sportDNA}</strong></p></Card>
        </div>
      );
    }

    function Scout({ onNavigate }) {
      const [sp, setSp] = useState(null);
      const players = SAMPLE.map(p => ({ ...p, analysis: generateAnalysis(p.name, p.age, p.position) }));
      if (sp) return <Report player={sp} analysis={sp.analysis} onNavigate={() => setSp(null)} />;
      return (
        <div style={{ minHeight: "100vh", padding: "40px 20px", maxWidth: 900, margin: "0 auto" }}>
          <button onClick={() => onNavigate("home")} style={{ background: "none", border: "none", color: COLORS.accent, cursor: "pointer", marginBottom: 20 }}>← الرئيسية</button>
          <h2 style={{ fontSize: 28, fontWeight: 800, color: COLORS.text, margin: "0 0 24px" }}>🔍 لوحة الكشاف</h2>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 16 }}>
            {players.map((p, i) => { const c = p.analysis.overall >= 80 ? COLORS.accent : p.analysis.overall >= 65 ? COLORS.warning : COLORS.danger; return (<Card key={p.id} h onClick={() => setSp(p)}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><div><div style={{ fontWeight: 700, color: COLORS.text, marginBottom: 6 }}>{i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : ""} {p.name}</div><Badge>{p.position}</Badge></div><div style={{ width: 50, height: 50, borderRadius: "50%", border: "2px solid " + c, display: "flex", alignItems: "center", justifyContent: "center" }}><span style={{ fontWeight: 800, color: c }}>{p.analysis.overall}</span></div></div></Card>); })}
          </div>
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState("home");
      const [player, setPlayer] = useState(null);
      const [analysis, setAnalysis] = useState(null);
      return (<div style={{ background: COLORS.bg, minHeight: "100vh", direction: "rtl" }}>{page === "home" && <Landing onNavigate={setPage} />}{page === "upload" && <Upload onNavigate={setPage} onAnalyze={p => { setPlayer(p); setPage("analyzing"); }} />}{page === "analyzing" && <Analyzing player={player} onComplete={r => { setAnalysis(r); setPage("report"); }} />}{page === "report" && <Report player={player} analysis={analysis} onNavigate={setPage} />}{page === "scout" && <Scout onNavigate={setPage} />}</div>);
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
