<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCOUT AI</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background: #0a0f1a; font-family: sans-serif; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; text-align: center; }
    .btn { background: #00e676; color: #0a0f1a; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin: 10px; }
    .card { background: #111827; padding: 20px; border-radius: 15px; margin: 10px 0; }
    .score { font-size: 48px; font-weight: bold; color: #00e676; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;
    
    function App() {
      const [page, setPage] = useState('home');
      const [player, setPlayer] = useState(null);
      
      function analyze() {
        setPage('analyzing');
        setTimeout(() => {
          setPlayer({ name: 'فهد', age: 17, position: 'مهاجم', score: 84 });
          setPage('report');
        }, 2000);
      }
      
      if (page === 'home') return (
        <div className="container">
          <h1>SCOUT AI</h1>
          <button className="btn" onClick={analyze}>🎬 ارفع فيديو</button>
        </div>
      );
      
      if (page === 'analyzing') return (
        <div className="container">
          <h2>جاري التحليل...</h2>
        </div>
      );
      
      if (page === 'report') return (
        <div className="container">
          <div className="card">
            <h2>{player.name}</h2>
            <p>{player.position} - {player.age} سنة</p>
            <div className="score">{player.score}</div>
            <p>موهبة استثنائية</p>
          </div>
          <button className="btn" onClick={() => setPage('home')}>الرئيسية</button>
        </div>
      );
    }
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
